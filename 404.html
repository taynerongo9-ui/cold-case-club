<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case Not Found — Cold Case Club</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600;700&family=Courier+Prime&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
    }
    .error-box { max-width: 480px; }
    .error-code {
      font-family: var(--font-mono);
      font-size: .8rem;
      letter-spacing: .2em;
      color: var(--red-bright);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .error-box h1 { font-size: 2.2rem; margin-bottom: 1rem; }
    .error-box p { color: var(--text-muted); margin-bottom: 2rem; line-height: 1.7; }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-box">
      <div class="error-code">Case File #404</div>
      <h1>This Trail Has Gone <span class="text-gold">Cold</span></h1>
      <p>The page you're looking for doesn't exist, has been redacted, or was never filed. Even the best investigators hit dead ends.</p>
      <a href="/" class="btn btn-primary">Back to Headquarters</a>
    </div>
  </div>
</body>
</html>
